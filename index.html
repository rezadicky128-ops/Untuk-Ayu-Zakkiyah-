<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>untuk ayu zakkiya 🤍</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Georgia,serif;color:#fff;background:#14111f}
.hidden{display:none}
#login,#app,#reader{max-width:1000px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border-radius:22px;padding:20px;margin:12px 0}
h1,h2,h3{margin-top:0}
input,textarea,select{width:100%;padding:12px;border-radius:12px;border:none;margin:8px 0}
button{padding:10px 16px;border:none;border-radius:12px;cursor:pointer;margin:4px}
.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.small{opacity:.8;font-size:.9em}
#rContent{white-space:pre-wrap;line-height:1.6;}

/* --- STYLE BARU UNTUK MUSEUM FOTO (GRID 2 KOLOM) --- */
.museum-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 20px;
}
.museum-item {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(212, 175, 55, 0.2);
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s;
}
.museum-item:active {
  transform: scale(0.96);
}
.photo-frame {
  width: 100%;
  aspect-ratio: 1/1;
  overflow: hidden;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}
.photo-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.photo-title {
  padding: 10px;
  text-align: center;
  font-size: 14px;
  color: #e5c398;
}

/* Style Foto di Dalam Surat */
.reader-img {
  width: 100%;
  max-height: 350px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 20px;
  border: 1px solid rgba(212, 175, 55, 0.2);
}
</style>
</head>
<body>

<!-- 1. HALAMAN LOGIN (Sama Persis, Tidak Diubah) -->
<div id="login">
  <div class="card" style="text-align: center; padding: 25px; background: rgba(15, 15, 20, 0.9); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px;">
    <h1 style="font-family: 'Georgia', serif; font-style: italic; font-size: 26px; color: #e5c398; margin-bottom: 15px; font-weight: normal;">
      untuk ayu zakkiya 🤍
    </h1>
    <img src="gerbera.png" alt="Bunga Gerbera" style="display: block; width: 100%; max-width: 280px; height: 280px; object-fit: cover; margin: 0 auto 20px auto; border-radius: 10px;">
    <p style="font-family: 'Georgia', serif; font-size: 15px; color: #e5c398; opacity: 0.9; margin-bottom: 25px; line-height: 1.5;">
      ini tentang kya... tentang aku...<br>dan tentang kenangan...
    </p>
    <p><i>untuk masuk,<br>ketik kata yang kusimpan untukmu.</i></p>
    <input id="pw" type="password" placeholder="password">
    <button onclick="login()">masuk</button>
    <p id="msg"></p>
  </div>
</div>

<!-- PEMUTAR MUSIK UTK HALAMAN KE-2 (Ganti link src dengan lagu mp3 kamu nanti) -->
<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<!-- 2. HALAMAN UTAMA (MUSEUM FOTO - MENGGANTIKAN HALAMAN INPUT KEMARIN) -->
<div id="app" class="hidden">
  <div style="text-align: center; margin-bottom: 20px;">
    <h2 style="font-style: italic; color: #e5c398; letter-spacing: 1px;">Museum Kenangan</h2>
    <p style="opacity: 0.7; font-size: 0.9em;">— ketuk foto untuk membaca ceritanya —</p>
  </div>
  
  <!-- Tempat Grid Foto Ter-render -->
  <div class="museum-grid" id="letters"></div>
</div>

<!-- 3. HALAMAN BACA SURAT -->
<div id="reader" class="hidden">
  <div class="topbar">
    <button onclick="backHome()" style="background: rgba(255,255,255,0.1); color: #fff;">← kembali</button>
  </div>
  
  <div id="readerCard" class="card" style="background: rgba(15, 15, 20, 0.95);">
    <!-- FOTO KENANGAN DI PALING ATAS -->
    <img id="rImg" class="reader-img" src="" alt="Foto Kenangan">
    
    <!-- JUDUL SURAT -->
    <h2 id="rTitle" style="color: #e5c398; text-align: center; font-style: italic; margin-bottom: 5px;"></h2>
    <div id="rDate" class="small" style="text-align: center; margin-bottom: 20px; opacity: 0.5;"></div>
    
    <!-- ISI TULISAN -->
    <div id="rContent"></div>
  </div>
</div>

<script>
let currentIndex = null;

// --- DATA KONTEN MUSEUM (Foto, Judul, & Isi Surat) ---
// Ganti "foto1.jpg", dst dengan nama file foto aslimu yang di-upload ke GitHub
const museumData = [
  {
    title: "Awal Mula ✨",
    img: "foto1.jpg", 
    content: "Hai Kya... Ini adalah tempat di mana semua cerita kita dicatat. Ingat tidak waktu pertama kali kita..."
  },
  {
    title: "Senyuman Favorit 🤍",
    img: "foto2.jpg",
    content: "Dari sekian banyak hal di dunia, senyuman kamu tetap jadi hal favorit yang selalu ingin aku lihat setiap hari..."
  },
  {
    title: "Hari Spesial 🎂",
    img: "foto3.jpg",
    content: "Selamat momen spesial kita! Terima kasih ya sudah berjuang bareng-bareng sampai sejauh ini..."
  },
  {
    title: "Selamanya 🔗",
    img: "foto4.jpg",
    content: "Harapanku ringkas saja, semoga selalu ada kata kita di setiap lembaran cerita selanjutnya. Aku sayang kamu."
  }
];

async function login(){
  if(pw.value.trim() === "selalutentangkya"){
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    
    // MEMUTAR LAGU OTOMATIS SAAT MASUK Halaman 2
    const lagu = document.getElementById('bgMusic');
    lagu.play().catch(err => console.log("Musik otomatis berputar setelah layar interaktif."));
    
    render();
  } else {
    msg.innerText = "kata yang kamu masukkan belum tepat.";
  }
}

// Fungsi menampilkan koleksi foto berbentuk grid museum
function render(){
  const container = document.getElementById('letters');
  container.innerHTML = '';

  museumData.forEach((x, i) => {
    const item = document.createElement('div');
    item.className = 'museum-item';
    item.innerHTML = `
      <div class="photo-frame">
        <img src="${x.img}" alt="${x.title}">
      </div>
      <div class="photo-title">${x.title}</div>
    `;
    item.onclick = () => openLetter(i);
    container.appendChild(item);
  });
}

function openLetter(i){
  currentIndex = i;
  const d = museumData[i];
  
  document.getElementById('app').classList.add('hidden');
  document.getElementById('reader').classList.remove('hidden');

  // Memasang foto di atas, judul di tengah, isi surat di bawah
  document.getElementById('rImg').src = d.img;
  document.getElementById('rTitle').textContent = d.title;
  document.getElementById('rDate').textContent = "Museum Kenangan Kita";
  document.getElementById('rContent').textContent = d.content;
  
  window.scrollTo(0, 0);
}

function backHome(){
  document.getElementById('reader').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  render();
}
</script>
</body>
</html>
